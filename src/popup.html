<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        --bg: #121212;
        --fg: #f1f1f1;
        --muted: #9a9a9a;
        --accent: #fe2c55;
        --track: #3a3a3a;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        width: 260px;
        font-family: -apple-system, "TikTok Sans", "Segoe UI", Roboto, Arial, sans-serif;
        background: var(--bg);
        color: var(--fg);
      }
      .card { padding: 16px; }
      .title {
        font-size: 14px;
        font-weight: 600;
        line-height: 1.3;
        margin-bottom: 14px;
      }
      .title .accent { color: var(--accent); }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        cursor: pointer;
        user-select: none;
      }
      .row-label { font-size: 13px; }
      /* toggle switch */
      .switch { position: relative; width: 42px; height: 24px; flex: 0 0 auto; }
      .switch input { opacity: 0; width: 0; height: 0; }
      .slider {
        position: absolute;
        inset: 0;
        background: var(--track);
        border-radius: 999px;
        transition: background 0.15s ease;
      }
      .slider::before {
        content: "";
        position: absolute;
        height: 18px;
        width: 18px;
        left: 3px;
        top: 3px;
        background: #fff;
        border-radius: 50%;
        transition: transform 0.15s ease;
      }
      .switch input:checked + .slider { background: var(--accent); }
      .switch input:checked + .slider::before { transform: translateX(18px); }
      .status {
        margin-top: 14px;
        font-size: 12px;
        line-height: 1.4;
        color: var(--muted);
        min-height: 16px;
      }
      .status.ok { color: #35f4ee; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="title">
        <span class="accent">TikTok</span> Live — Force Vertical
      </div>
      <label class="row" for="toggle">
        <span class="row-label">Auto vertical layout</span>
        <span class="switch">
          <input type="checkbox" id="toggle" />
          <span class="slider"></span>
        </span>
      </label>
      <div class="status" id="status">…</div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
